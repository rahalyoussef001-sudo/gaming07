<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaming07 — Content Cluster Map</title>
  <style>
    :root {
      --bg: #0d0d1a;
      --bg-secondary: #13132b;
      --text: #e0e0f0;
      --text-secondary: #8888aa;
      --border: #2a2a4a;
      --pillar-fill: #1e1044;
      --pillar-stroke: #7c3aed;
      --link-mandatory: #7c3aed;
      --link-recommended: #06b6d4;
      --link-optional: #f59e0b;
      --tooltip-bg: #0d0d1a;
      --tooltip-text: #e0e0f0;
      --stats-bg: #13132b;
      --written-opacity: 1.0;
      --planned-opacity: 0.55;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      text-align: center;
      padding: 28px 16px 10px;
      background: linear-gradient(180deg, #13132b 0%, transparent 100%);
    }
    header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(90deg, #8b5cf6, #06b6d4, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }
    header p { font-size: 0.85rem; color: var(--text-secondary); }
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 14px 16px;
      background: var(--stats-bg);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .stat { text-align: center; }
    .stat-value { font-size: 1.4rem; font-weight: 700; color: var(--text); }
    .stat-label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
    .map-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      min-height: 520px;
    }
    svg { max-width: 100%; max-height: 80vh; }
    .pillar-node { cursor: pointer; }
    .pillar-node:hover circle { filter: brightness(1.3); }
    .spoke-node { cursor: pointer; }
    .spoke-node:hover circle { filter: brightness(1.25); }
    .spoke-node.planned circle { opacity: var(--planned-opacity); stroke-dasharray: 5 3; }
    .spoke-node.written circle { opacity: var(--written-opacity); }
    .link-line { transition: opacity 0.2s, stroke-width 0.2s; }
    .link-line.mandatory { stroke: var(--link-mandatory); stroke-width: 2; }
    .link-line.recommended { stroke: var(--link-recommended); stroke-width: 1.5; stroke-dasharray: 7 4; }
    .link-line.optional { stroke: var(--link-optional); stroke-width: 1; stroke-dasharray: 3 4; }
    .link-line.dimmed { opacity: 0.08; }
    .link-line.highlighted { opacity: 1 !important; stroke-width: 3 !important; }
    .node-label { font-size: 10px; fill: #ccccdd; text-anchor: middle; pointer-events: none; user-select: none; }
    .pillar-label { font-size: 12px; font-weight: 700; fill: #ffffff; text-anchor: middle; pointer-events: none; }
    .cluster-label { font-size: 9px; fill: var(--text-secondary); text-anchor: middle; pointer-events: none; font-style: italic; }
    .tooltip {
      position: fixed;
      background: #0d0d1a;
      border: 1px solid #2a2a4a;
      color: var(--tooltip-text);
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.8rem;
      line-height: 1.6;
      max-width: 290px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .tooltip.visible { opacity: 1; }
    .tooltip-title { font-weight: 700; margin-bottom: 6px; color: #e0e0f0; }
    .tooltip-detail { display: flex; justify-content: space-between; gap: 12px; }
    .tooltip-detail span:first-child { color: var(--text-secondary); }
    .badge {
      display: inline-block;
      font-size: 0.65rem;
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 600;
    }
    .badge-written { background: #065f46; color: #6ee7b7; }
    .badge-planned { background: #1e1a3e; color: #a78bfa; border: 1px solid #4c1d95; }
    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 10px 16px 6px;
      flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--text-secondary); }
    .legend-line { width: 22px; height: 2px; }
    .legend-line.mandatory { background: var(--link-mandatory); }
    .legend-line.recommended { background: var(--link-recommended); }
    .legend-line.optional { background: var(--link-optional); }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    .legend-dot.written { background: #059669; }
    .legend-dot.planned { background: #059669; opacity: 0.4; border: 1px dashed #059669; }
    footer {
      text-align: center;
      padding: 10px 16px;
      font-size: 0.72rem;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <header>
    <h1>Gaming07 — Content Cluster Map</h1>
    <p>Semantic architecture based on SERP overlap · 3 clusters · 11 articles · 40 links</p>
  </header>
  <div class="stats-bar">
    <div class="stat"><div class="stat-value" id="stat-posts">11</div><div class="stat-label">Total Articles</div></div>
    <div class="stat"><div class="stat-value" id="stat-clusters">3</div><div class="stat-label">Clusters</div></div>
    <div class="stat"><div class="stat-value" id="stat-links">40</div><div class="stat-label">Internal Links</div></div>
    <div class="stat"><div class="stat-value" id="stat-words">24,300</div><div class="stat-label">Est. Words</div></div>
    <div class="stat"><div class="stat-value" id="stat-written">8</div><div class="stat-label">Written</div></div>
  </div>
  <div class="map-container">
    <svg id="cluster-svg" role="img" aria-label="Gaming07 Content Cluster Map"></svg>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-line mandatory"></div> Mandatory link</div>
    <div class="legend-item"><div class="legend-line recommended"></div> Recommended link</div>
    <div class="legend-item"><div class="legend-line optional"></div> Optional link</div>
    <div class="legend-item"><div class="legend-dot written"></div> Written</div>
    <div class="legend-item"><div class="legend-dot planned"></div> Planned</div>
  </div>
  <footer>Gaming07 · SEO Cluster v2.2.0 · July 2026</footer>
  <div class="tooltip" id="tooltip"></div>
  <script>
    // === CLUSTER DATA ===
    const CLUSTER_DATA = {
      pillar: {
        title: "Top 5 Best PC RPGs 2026",
        keyword: "best PC RPGs 2026",
        volume: 4800,
        template: "best-of",
        wordCount: 2500,
        url: "/articles/best-pc-rpgs-2026",
        status: "written",
        funnel: "TOFU",
        color: "#7c3aed"
      },
      clusters: [
        {
          name: "Neverness to Everness",
          color: "#8B5CF6",
          posts: [
            { title: "NTE Beginner Guide", keyword: "neverness to everness beginner guide", volume: 3200, template: "ultimate-guide", wordCount: 3500, url: "/articles/nte-guide-debutant", status: "written", funnel: "TOFU/MOFU" },
            { title: "Is NTE Ultimate Urban RPG?", keyword: "neverness to everness review", volume: 2100, template: "review", wordCount: 2000, url: "/articles/neverness-to-everness", status: "written", funnel: "MOFU" },
            { title: "NTE Tier List 2026", keyword: "neverness to everness tier list", volume: 2900, template: "best-of", wordCount: 1800, url: "/articles/nte-tier-list", status: "written", funnel: "MOFU/BOFU" },
            { title: "NTE Gacha & Pity System", keyword: "neverness to everness gacha", volume: 1800, template: "explainer", wordCount: 1500, url: "/articles/nte-gacha", status: "planned", funnel: "TOFU" }
          ]
        },
        {
          name: "Once Human",
          color: "#F59E0B",
          posts: [
            { title: "Once Human Stardust Farm", keyword: "once human stardust farming", volume: 2400, template: "how-to", wordCount: 1500, url: "/articles/once-human-stardust", status: "written", funnel: "MOFU/BOFU" },
            { title: "Is Once Human Cosmic Survival?", keyword: "once human review", volume: 5100, template: "review", wordCount: 3500, url: "/articles/once-human", status: "written", funnel: "TOFU/MOFU" },
            { title: "Once Human Base Defense", keyword: "once human base defense", volume: 1600, template: "how-to", wordCount: 1500, url: "/articles/once-human-base-defense", status: "planned", funnel: "MOFU" }
          ]
        },
        {
          name: "Arknights: Endfield",
          color: "#06B6D4",
          posts: [
            { title: "Endfield Logistics Guide", keyword: "arknights endfield logistics guide", volume: 2800, template: "ultimate-guide", wordCount: 3000, url: "/articles/endfield-logistique", status: "written", funnel: "MOFU" },
            { title: "Arknights: Endfield PC Review", keyword: "arknights endfield review", volume: 1400, template: "review", wordCount: 2000, url: "/articles/arknights-endfield", status: "written", funnel: "MOFU/BOFU" },
            { title: "Endfield Combat Synergies", keyword: "arknights endfield combat", volume: 1200, template: "how-to", wordCount: 1500, url: "/articles/endfield-combat", status: "planned", funnel: "MOFU" }
          ]
        }
      ],
      links: [
        { from: "pillar", to: "cluster-0-post-0", type: "mandatory" },
        { from: "pillar", to: "cluster-0-post-1", type: "mandatory" },
        { from: "pillar", to: "cluster-1-post-0", type: "mandatory" },
        { from: "pillar", to: "cluster-1-post-1", type: "mandatory" },
        { from: "pillar", to: "cluster-2-post-0", type: "mandatory" },
        { from: "pillar", to: "cluster-2-post-1", type: "mandatory" },
        { from: "cluster-0-post-0", to: "pillar", type: "mandatory" },
        { from: "cluster-0-post-1", to: "pillar", type: "mandatory" },
        { from: "cluster-0-post-2", to: "pillar", type: "mandatory" },
        { from: "cluster-0-post-3", to: "pillar", type: "mandatory" },
        { from: "cluster-1-post-0", to: "pillar", type: "mandatory" },
        { from: "cluster-1-post-1", to: "pillar", type: "mandatory" },
        { from: "cluster-1-post-2", to: "pillar", type: "mandatory" },
        { from: "cluster-2-post-0", to: "pillar", type: "mandatory" },
        { from: "cluster-2-post-1", to: "pillar", type: "mandatory" },
        { from: "cluster-2-post-2", to: "pillar", type: "mandatory" },
        { from: "cluster-0-post-0", to: "cluster-0-post-1", type: "recommended" },
        { from: "cluster-0-post-0", to: "cluster-0-post-2", type: "recommended" },
        { from: "cluster-0-post-0", to: "cluster-0-post-3", type: "recommended" },
        { from: "cluster-0-post-1", to: "cluster-0-post-0", type: "recommended" },
        { from: "cluster-0-post-1", to: "cluster-0-post-2", type: "recommended" },
        { from: "cluster-0-post-2", to: "cluster-0-post-0", type: "recommended" },
        { from: "cluster-0-post-2", to: "cluster-0-post-3", type: "recommended" },
        { from: "cluster-0-post-3", to: "cluster-0-post-0", type: "recommended" },
        { from: "cluster-0-post-3", to: "cluster-0-post-2", type: "recommended" },
        { from: "cluster-1-post-0", to: "cluster-1-post-1", type: "recommended" },
        { from: "cluster-1-post-0", to: "cluster-1-post-2", type: "recommended" },
        { from: "cluster-1-post-1", to: "cluster-1-post-0", type: "recommended" },
        { from: "cluster-1-post-1", to: "cluster-1-post-2", type: "recommended" },
        { from: "cluster-1-post-2", to: "cluster-1-post-0", type: "recommended" },
        { from: "cluster-1-post-2", to: "cluster-1-post-1", type: "recommended" },
        { from: "cluster-2-post-0", to: "cluster-2-post-1", type: "recommended" },
        { from: "cluster-2-post-0", to: "cluster-2-post-2", type: "recommended" },
        { from: "cluster-2-post-1", to: "cluster-2-post-0", type: "recommended" },
        { from: "cluster-2-post-1", to: "cluster-2-post-2", type: "recommended" },
        { from: "cluster-2-post-2", to: "cluster-2-post-0", type: "recommended" },
        { from: "cluster-2-post-2", to: "cluster-2-post-1", type: "recommended" },
        { from: "cluster-0-post-0", to: "cluster-1-post-1", type: "optional" },
        { from: "cluster-1-post-1", to: "cluster-0-post-0", type: "optional" },
        { from: "cluster-1-post-1", to: "cluster-2-post-0", type: "optional" }
      ],
      meta: { totalPosts: 11, totalClusters: 3, totalLinks: 40, estimatedWords: 24300 }
    };

    (function render() {
      const data = CLUSTER_DATA;
      const svg = document.getElementById("cluster-svg");
      const tooltip = document.getElementById("tooltip");

      const numClusters = data.clusters.length;
      const clusterRadius = 180;
      const spokeRadius = 80;
      const totalRadius = clusterRadius + spokeRadius + 75;
      const cx = totalRadius + 50;
      const cy = totalRadius + 50;
      const width = (totalRadius + 50) * 2;
      const height = (totalRadius + 50) * 2;

      svg.setAttribute("viewBox", "0 0 " + width + " " + height);
      svg.setAttribute("width", Math.min(width, 950));
      svg.setAttribute("height", Math.min(height, 950));

      const nodePositions = {};
      nodePositions["pillar"] = { x: cx, y: cy };

      const clusterCenters = [];
      for (let ci = 0; ci < numClusters; ci++) {
        const angle = (2 * Math.PI * ci) / numClusters - Math.PI / 2;
        const ccx = cx + Math.cos(angle) * clusterRadius;
        const ccy = cy + Math.sin(angle) * clusterRadius;
        clusterCenters.push({ x: ccx, y: ccy, angle });
        const cluster = data.clusters[ci];
        const numPosts = cluster.posts.length;
        for (let pi = 0; pi < numPosts; pi++) {
          const spread = Math.PI * 0.7;
          const startAngle = angle - spread / 2;
          const postAngle = numPosts === 1 ? angle : startAngle + (spread * pi) / (numPosts - 1);
          nodePositions["cluster-" + ci + "-post-" + pi] = {
            x: ccx + Math.cos(postAngle) * spokeRadius,
            y: ccy + Math.sin(postAngle) * spokeRadius
          };
        }
      }

      let s = "";

      // Defs for glow
      s += '<defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>';

      // Links
      data.links.forEach(function(link, idx) {
        const fp = nodePositions[link.from];
        const tp = nodePositions[link.to];
        if (!fp || !tp) return;
        s += '<line id="link-' + idx + '" class="link-line ' + link.type + '" x1="' + fp.x + '" y1="' + fp.y + '" x2="' + tp.x + '" y2="' + tp.y + '" data-from="' + link.from + '" data-to="' + link.to + '"/>';
      });

      // Cluster labels
      clusterCenters.forEach(function(cc, ci) {
        const cluster = data.clusters[ci];
        const lx = cx + Math.cos(cc.angle) * (clusterRadius * 0.52);
        const ly = cy + Math.sin(cc.angle) * (clusterRadius * 0.52);
        s += '<text class="cluster-label" x="' + lx + '" y="' + ly + '">' + esc(cluster.name) + '</text>';
      });

      // Spoke nodes
      data.clusters.forEach(function(cluster, ci) {
        const color = cluster.color;
        cluster.posts.forEach(function(post, pi) {
          const nodeId = "cluster-" + ci + "-post-" + pi;
          const pos = nodePositions[nodeId];
          const sc = post.status === "written" ? "written" : "planned";
          const r = 24;
          s += '<g class="spoke-node ' + sc + '" data-node="' + nodeId + '" tabindex="0" role="button" aria-label="' + esc(post.title) + '">';
          s += '<circle cx="' + pos.x + '" cy="' + pos.y + '" r="' + r + '" fill="' + color + '" stroke="' + darken(color) + '" stroke-width="2"/>';
          if (post.status === "written") {
            s += '<text x="' + pos.x + '" y="' + (pos.y + 4) + '" text-anchor="middle" font-size="14" fill="white" pointer-events="none">✓</text>';
          }
          const words = post.title.split(" ");
          const line1 = words.slice(0, Math.ceil(words.length / 2)).join(" ");
          const line2 = words.slice(Math.ceil(words.length / 2)).join(" ");
          s += '<text class="node-label" x="' + pos.x + '" y="' + (pos.y + r + 14) + '">' + esc(trunc(line1, 14)) + '</text>';
          if (line2) s += '<text class="node-label" x="' + pos.x + '" y="' + (pos.y + r + 25) + '">' + esc(trunc(line2, 14)) + '</text>';
          s += '</g>';
        });
      });

      // Pillar node
      const pc = "#7c3aed";
      s += '<g class="pillar-node" data-node="pillar" tabindex="0" role="button" aria-label="Pillar: ' + esc(data.pillar.title) + '">';
      s += '<circle cx="' + cx + '" cy="' + cy + '" r="44" fill="' + pc + '" stroke="#a78bfa" stroke-width="3" filter="url(#glow)"/>';
      s += '<text class="pillar-label" x="' + cx + '" y="' + (cy - 12) + '">✓ PILLAR</text>';
      s += '<text class="pillar-label" x="' + cx + '" y="' + (cy + 6) + '" style="font-size:9px;">RPG PC 2026</text>';
      s += '</g>';

      svg.innerHTML = s;

      // Events
      function showTip(e, nodeId) {
        let info;
        if (nodeId === "pillar") { info = data.pillar; }
        else {
          const m = nodeId.match(/cluster-(\d+)-post-(\d+)/);
          if (!m) return;
          info = data.clusters[parseInt(m[1])].posts[parseInt(m[2])];
        }
        if (!info) return;
        const statusBadge = info.status === "written"
          ? '<span class="badge badge-written">✓ Written</span>'
          : '<span class="badge badge-planned">⬜ Planned</span>';
        let h = '<div class="tooltip-title">' + esc(info.title) + ' ' + statusBadge + '</div>';
        h += '<div class="tooltip-detail"><span>Keyword:</span><span>' + esc(info.keyword) + '</span></div>';
        h += '<div class="tooltip-detail"><span>Volume:</span><span>' + (info.volume||"N/A") + '/mo</span></div>';
        h += '<div class="tooltip-detail"><span>Template:</span><span>' + esc(info.template) + '</span></div>';
        h += '<div class="tooltip-detail"><span>Words:</span><span>' + info.wordCount.toLocaleString("en") + '</span></div>';
        if (info.funnel) h += '<div class="tooltip-detail"><span>Funnel:</span><span>' + esc(info.funnel) + '</span></div>';
        tooltip.innerHTML = h;
        tooltip.classList.add("visible");
        moveTip(e);
      }
      function moveTip(e) {
        const r = tooltip.getBoundingClientRect();
        let tx = e.clientX + 14, ty = e.clientY + 14;
        if (tx + r.width > window.innerWidth) tx = e.clientX - r.width - 14;
        if (ty + r.height > window.innerHeight) ty = e.clientY - r.height - 14;
        tooltip.style.left = tx + "px";
        tooltip.style.top = ty + "px";
      }
      function hideTip() { tooltip.classList.remove("visible"); }
      function hlLinks(nodeId) {
        document.querySelectorAll(".link-line").forEach(l => {
          if (l.dataset.from === nodeId || l.dataset.to === nodeId) { l.classList.add("highlighted"); l.classList.remove("dimmed"); }
          else { l.classList.add("dimmed"); l.classList.remove("highlighted"); }
        });
      }
      function resetLinks() { document.querySelectorAll(".link-line").forEach(l => l.classList.remove("highlighted","dimmed")); }

      document.querySelectorAll(".pillar-node, .spoke-node").forEach(node => {
        const nid = node.dataset.node;
        node.addEventListener("mouseenter", e => { showTip(e, nid); hlLinks(nid); });
        node.addEventListener("mousemove", moveTip);
        node.addEventListener("mouseleave", () => { hideTip(); resetLinks(); });
        node.addEventListener("focus", e => { showTip(e, nid); hlLinks(nid); });
        node.addEventListener("blur", () => { hideTip(); resetLinks(); });
      });
    })();

    function esc(str) { var d = document.createElement("div"); d.textContent = str; return d.innerHTML; }
    function trunc(str, n) { return str && str.length > n ? str.slice(0, n-1) + "…" : str || ""; }
    function darken(hex) {
      var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      r = Math.max(0, Math.floor(r*0.7)); g = Math.max(0, Math.floor(g*0.7)); b = Math.max(0, Math.floor(b*0.7));
      return "#" + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
    }
  </script>
</body>
</html>
